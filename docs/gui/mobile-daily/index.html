<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge Daily Extraction</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Forge Mobile Daily</h1>
    
    <div class="form-group">
      <input type="text" id="prospectAlias" placeholder="Prospect Alias">
      <textarea id="noteText" placeholder="Enter note..."></textarea>
      <div class="button-group">
        <button id="testNoteBtn">Test Note</button>
        <button id="processBtn">Process Note</button>
      </div>
    </div>

    <div id="loading" class="hidden">Processing...</div>
    <div id="error" class="hidden error"></div>
    <div id="results" class="hidden">
      <div id="metaInfo"></div>
      <div id="candidatesList"></div>
      <div id="unknownsList"></div>
      <details>
        <summary>Raw JSON</summary>
        <pre id="rawJson"></pre>
      </details>
    </div>

    <div class="timeline-container" id="timelineContainer">
      <h2>Prospect Timeline (Beta)</h2>
      <div id="timelineSummary" class="timeline-summary"></div>
      <div class="timeline-filters">
        <input type="text" id="timelineSearch" placeholder="Search...">
        <button onclick="filterTimeline('All')">All</button>
        <button onclick="filterTimeline('Accepted')">Accepted</button>
        <button onclick="filterTimeline('Rejected')">Rejected</button>
        <button onclick="filterTimeline('Waiting')">Waiting</button>
        <button onclick="filterTimeline('Action Required')">Action Required</button>
        <button onclick="filterTimeline('Informational')">Informational</button>
      </div>
      <div id="timelineList"></div>
      <p class="explanation-panel">"This timeline is a working memory view. Canonical truth remains outside the timeline."</p>
    </div>
  </div>
  <script src="app.js?v=202"></script>
</body>
</html>
