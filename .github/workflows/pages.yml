name: Deploy ForgeOS to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Pages public configuration
        env:
          DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ "$DEMO_MODE" != "true" ]; then
            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
              echo "Error: GitHub SUPABASE_URL and SUPABASE_ANON_KEY are required when DEMO_MODE is not 'true'"
              exit 1
            fi
          fi
          node -e "if(process.env.DEMO_MODE!=='true'){const u=new URL(process.env.SUPABASE_URL);if(u.hostname!=='rmlxigxysujsuwzgoimv.supabase.co')throw new Error('SUPABASE_URL_PROJECT_REF_MISMATCH')}"

      - name: Generate env.js
        env:
          DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const isDemo = process.env.DEMO_MODE === 'true';
          const env = {
            SUPABASE_URL: process.env.SUPABASE_URL || "",
            SUPABASE_KEY: process.env.SUPABASE_ANON_KEY || "",
            DEMO_MODE: isDemo ? "true" : "false"
          };
          console.log(`Generating env.js (DEMO_MODE: ${env.DEMO_MODE})`);
          fs.writeFileSync('env.js', `window.__ENV__ = Object.freeze(${JSON.stringify(env, null, 2)});\n`);
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Advisor OS presentation Pages runtime
        run: node scripts/build-advisor-presentation-pages-runtime.mjs

      - name: Build Pages artifact directory
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execFileSync } = require('child_process');

          const siteDir = '_site';
          fs.rmSync(siteDir, { recursive: true, force: true });
          fs.mkdirSync(siteDir, { recursive: true });

          const trackedFiles = execFileSync('git', ['ls-files', '-z'], { encoding: 'utf8' })
            .split('\0')
            .filter(Boolean);

          const publicExtensions = new Set([
            '.css',
            '.html',
            '.ico',
            '.jpeg',
            '.jpg',
            '.js',
            '.json',
            '.map',
            '.png',
            '.svg',
            '.txt',
            '.webmanifest',
            '.webp'
          ]);

          const publicRootFiles = new Set([
            '.nojekyll',
            '_redirects',
            'manifest.json'
          ]);

          function isPublicFile(file) {
            if (file.startsWith('.github/')) return false;
            if (file.startsWith('docs/evidence/')) return false;
            if (file.startsWith('advisor-os/sales-pipeline/')) {
              return publicExtensions.has(path.extname(file).toLowerCase());
            }
            if (!file.startsWith('docs/')) return publicRootFiles.has(file);
            if (file.includes('/tests/')) return false;
            if (/(^|\/)([^/]*-)?(master-)?test(s)?\.(js|json)$/i.test(file)) return false;
            if (/\.(pdf|xlsx|zip)$/i.test(file)) return false;
            if (publicRootFiles.has(file)) return true;
            return publicExtensions.has(path.extname(file).toLowerCase());
          }

          for (const file of trackedFiles.filter(isPublicFile)) {
            const publicPath = file.startsWith('docs/') ? file.slice('docs/'.length) : file;
            const target = path.join(siteDir, publicPath);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.copyFileSync(file, target);
          }

          for (const file of trackedFiles.filter(file => file.startsWith('docs/') && file.endsWith('.html'))) {
            const target = path.join(siteDir, file.slice('docs/'.length));
            if (!fs.existsSync(target)) continue;
            const html = fs.readFileSync(target, 'utf8').replaceAll('__FORGE_BUILD_SHA__', process.env.GITHUB_SHA);
            fs.writeFileSync(target, html);
          }

          fs.copyFileSync('env.js', path.join(siteDir, 'env.js'));
          fs.writeFileSync(
            path.join(siteDir, 'build-info.json'),
            `${JSON.stringify({
              commitSha: process.env.GITHUB_SHA,
              generatedAt: new Date().toISOString(),
              artifact: 'forge-pages',
            }, null, 2)}\n`,
          );
          console.log(`Prepared ${trackedFiles.filter(isPublicFile).length + 1} public file(s) in ${siteDir}`);
          EOF
          du -sh _site

      - name: Validate Pages public configuration artifact
        env:
          EXPECTED_DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
        run: |
          node scripts/validate-pages-public-config.mjs _site/env.js
          node -e "const assert=require('assert');const fs=require('fs');const forgeAlive=fs.readFileSync('_site/static-preview/forge-alive/index.html','utf8');const mobileDaily=fs.readFileSync('_site/10-gui/mobile-daily/index.html','utf8');assert.match(forgeAlive,/env\.js\?v=[0-9a-f]{40}[\s\S]*forge-alive-public-config-067g17a1\.js\?v=[0-9a-f]{40}/);assert.match(mobileDaily,/env\.js\?v=[0-9a-f]{40}[\s\S]*forge-alive-public-config-067g17a1\.js\?v=[0-9a-f]{40}[\s\S]*app\.js/);assert.ok(fs.existsSync('_site/static-preview/forge-alive/forge-alive-public-config-067g17a1.js'))"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Wait for Pages deployment lock
        run: sleep 45

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
