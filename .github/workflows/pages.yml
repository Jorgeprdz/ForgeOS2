name: Deploy ForgeOS to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Pages env secrets
        env:
          DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "$DEMO_MODE" != "true" ]; then
            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
              echo "Error: SUPABASE_URL and SUPABASE_KEY secrets are required when DEMO_MODE is not 'true'"
              exit 1
            fi
          fi

      - name: Generate env.js
        env:
          DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const isDemo = process.env.DEMO_MODE === 'true';
          const env = {
            SUPABASE_URL: isDemo ? "" : (process.env.SUPABASE_URL || ""),
            SUPABASE_KEY: isDemo ? "" : (process.env.SUPABASE_KEY || ""),
            DEMO_MODE: isDemo ? "true" : "false"
          };
          console.log(`Generating env.js (DEMO_MODE: ${env.DEMO_MODE})`);
          fs.writeFileSync('env.js', `window.__ENV__ = ${JSON.stringify(env, null, 2)};\n`);
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
