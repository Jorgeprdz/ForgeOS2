name: Forge Imagina Ser Rate Snapshot

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/forge-imagina-ser-rate-snapshot.yml

permissions:
  contents: read

jobs:
  rate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fetch verified Banxico UDI
        shell: bash
        env:
          RATE_URL: https://rgcolnioakzrdtsxwscp.supabase.co/functions/v1/banxico-rates
          SUPABASE_PUBLIC_CLIENT_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p artifact
          node --input-type=module <<'NODE_RATE'
          import fs from "node:fs";
          import assert from "node:assert/strict";

          const url = process.env.RATE_URL;
          const key = process.env.SUPABASE_PUBLIC_CLIENT_KEY;

          assert.ok(url, "RATE_URL is required");
          assert.ok(key, "SUPABASE_PUBLIC_CLIENT_KEY is required");

          const response = await fetch(url, {
            method: "GET",
            headers: {
              Accept: "application/json",
              apikey: key,
              Authorization: `Bearer ${key}`,
            },
          });

          const payload = await response.json();

          assert.equal(response.status, 200);

          const udi =
            payload?.rates?.UDI_MXN
            ?? payload?.data?.rates?.UDI_MXN
            ?? payload?.UDI_MXN;

          const value = Number(udi?.value);
          const source = udi?.source;
          const sourceDate =
            udi?.date
            ?? udi?.sourceDate
            ?? null;

          assert.ok(
            Number.isFinite(value)
            && value > 0
          );

          assert.equal(
            source,
            "BANXICO_SIE_API"
          );

          assert.ok(sourceDate);

          fs.writeFileSync(
            "artifact/rate-metadata.json",
            JSON.stringify(
              {
                status: "PASS",
                provider: "SUPABASE_EDGE_EXISTING",
                endpoint: url,
                functionSlug: "banxico-rates",
                metadata: {
                  status:
                    "VERIFIED_UDI_RATE_AVAILABLE",
                  currentUdiValue: value,
                  source,
                  sourceDate,
                  sourceMode:
                    "SUPABASE_EDGE_LIVE",
                  cacheStatus: "LIVE",
                  seriesId:
                    udi?.seriesId ?? null,
                  title:
                    udi?.title ?? null
                }
              },
              null,
              2
            ) + "\n"
          );
          NODE_RATE

      - name: Upload verified rate metadata
        uses: actions/upload-artifact@v4
        with:
          name: forge-imagina-ser-rate-snapshot
          path: artifact/rate-metadata.json
          if-no-files-found: error
          retention-days: 1
