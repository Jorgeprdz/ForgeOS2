name: 067G17B Production Browser Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  productive-prospect-browser:
    if: github.actor == 'Jorgeprdz'
    environment: 067g17a1-remote-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORGE_067G17B_PRODUCTION_URL: https://jorgeprdz.github.io/ForgeOS/static-preview/forge-alive/?v=${{ github.sha }}
      FORGE_067G17B_EVIDENCE_DIR: artifacts/067g17b-production
      ADVISOR_A_EMAIL: ${{ secrets.ADVISOR_A_EMAIL }}
      ADVISOR_A_PASSWORD: ${{ secrets.ADVISOR_A_PASSWORD }}
      ADVISOR_B_EMAIL: ${{ secrets.ADVISOR_B_EMAIL }}
      ADVISOR_B_PASSWORD: ${{ secrets.ADVISOR_B_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install isolated browser harness
        run: npm install --no-save puppeteer@24.16.0
      - name: Run productive prospect browser acceptance
        env:
          FORGE_PUPPETEER_CORE_PATH: puppeteer
          FORGE_CHROMIUM_PATH: ${{ env.PUPPETEER_EXECUTABLE_PATH }}
        run: |
          export FORGE_CHROMIUM_PATH="$(node --input-type=module -e "import puppeteer from 'puppeteer'; console.log(puppeteer.executablePath())")"
          node tests/forge-067g17b-production-browser-acceptance.mjs
      - name: Upload redacted production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 067g17b-production-browser-evidence
          path: artifacts/067g17b-production
          if-no-files-found: error
