name: 067G17B Targeted Prospect Migration Deployment

on:
  push:
    branches:
      - feature/067g17b-productive-prospect-crud
    paths:
      - "supabase/migrations/20260619000100_supabase_rls_beta_foundation.sql"
      - "supabase/migrations/20260619000200_supabase_rls_live_hardening.sql"
      - "supabase/migrations/20260717000100_067g17a1_prospect_opportunity_security_foundation.sql"
      - "supabase/migrations/20260718000100_067g17b_productive_prospect_crud.sql"
      - "supabase/migrations/20260718000200_067g17b_remove_legacy_prospect_delete.sql"
      - "supabase/migrations/20260718000300_067g17b_owned_archive_guard_repair.sql"
      - "scripts/forge-067g17b-deploy-migrations.mjs"
      - ".github/workflows/067g17b-migration-deployment.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-prospect-foundation:
    if: github.actor == 'Jorgeprdz'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: rmlxigxysujsuwzgoimv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify targeted migration contract
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test "$SUPABASE_PROJECT_REF" = "rmlxigxysujsuwzgoimv"
          ! rg -n "DROP[[:space:]]+TABLE|TRUNCATE[[:space:]]|USING[[:space:]]*\([[:space:]]*true[[:space:]]*\)" \
            supabase/migrations/20260619000100_supabase_rls_beta_foundation.sql \
            supabase/migrations/20260619000200_supabase_rls_live_hardening.sql \
            supabase/migrations/20260717000100_067g17a1_prospect_opportunity_security_foundation.sql \
            supabase/migrations/20260718000100_067g17b_productive_prospect_crud.sql \
            supabase/migrations/20260718000200_067g17b_remove_legacy_prospect_delete.sql \
            supabase/migrations/20260718000300_067g17b_owned_archive_guard_repair.sql
          node --test tests/forge-067g17a1-migration-security-test.mjs
          node --test tests/forge-067g17b-prospect-migration-security-test.mjs
      - name: Apply exactly the approved prospect migrations
        run: node scripts/forge-067g17b-deploy-migrations.mjs
      - name: Upload redacted deployment ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 067g17b-migration-deployment-ledger
          path: artifacts/067g17b-migration/ledger.jsonl
          if-no-files-found: error
