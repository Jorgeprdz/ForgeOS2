name: Forge Supabase Runtime Audit R6

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/forge-supabase-runtime-audit-r6.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PUBLIC_CLIENT_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
      PROJECT_REF: "rgcolnioakzrdtsxwscp"
      EXPECTED_MARKET_SECRET_NAMES: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inventory remote Supabase runtime
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p audit/download
          cd audit/download

          npx -y supabase@latest functions list --project-ref "$PROJECT_REF" -o json > ../functions-list.json

          npx -y supabase@latest secrets list --project-ref "$PROJECT_REF" -o json > ../secrets-list.json

          node - <<'NODE_FUNCTIONS' > ../function-slugs.txt
          const fs = require("fs");
          const payload = JSON.parse(
            fs.readFileSync(
              "../functions-list.json",
              "utf8"
            )
          );
          const rows = Array.isArray(payload)
            ? payload
            : (
                payload.functions
                || payload.data
                || []
              );
          const slugs = [
            ...new Set(
              rows
                .map(
                  item =>
                    item.slug
                    || item.name
                    || item.function_name
                    || ""
                )
                .filter(Boolean)
            )
          ];
          process.stdout.write(
            slugs.join("\n")
            + (slugs.length ? "\n" : "")
          );
          NODE_FUNCTIONS

          : > ../download-results.tsv

          while IFS= read -r slug; do
            [ -n "$slug" ] || continue

            log_name="$(printf '%s' "$slug" | tr -c 'A-Za-z0-9._-' '_')"

            if npx -y supabase@latest functions download "$slug" --project-ref "$PROJECT_REF" --use-api > "../download-${log_name}.log" 2>&1; then
              printf '%s\tPASS\t0\n' "$slug" >> ../download-results.tsv
            else
              rc=$?
              printf '%s\tPARTIAL_OR_FAILED\t%s\n' "$slug" "$rc" >> ../download-results.tsv
            fi
          done < ../function-slugs.txt

          cd ../..

          python - <<'PY_AUDIT'
          from pathlib import Path
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError
          import json
          import os
          import re

          root = Path("audit/download/supabase/functions")
          functions_list_path = Path("audit/functions-list.json")
          secrets_list_path = Path("audit/secrets-list.json")
          output_path = Path("audit/audit.json")
          download_results_path = Path("audit/download-results.tsv")

          expected_market_names = [
              item.strip()
              for item in os.environ.get(
                  "EXPECTED_MARKET_SECRET_NAMES",
                  "",
              ).split(",")
              if item.strip()
          ]

          project_ref = os.environ["PROJECT_REF"]
          public_key = os.environ.get(
              "SUPABASE_PUBLIC_CLIENT_KEY",
              "",
          ).strip()

          function_dirs = [
              path
              for path in sorted(root.iterdir())
              if path.is_dir()
          ] if root.exists() else []

          def payload_rows(path, keys):
              if not path.is_file():
                  return []

              try:
                  payload = json.loads(
                      path.read_text(
                          encoding="utf-8",
                          errors="replace",
                      )
                  )
              except (
                  json.JSONDecodeError,
                  OSError,
              ):
                  return []

              if isinstance(payload, list):
                  return payload

              if isinstance(payload, dict):
                  for key in keys:
                      value = payload.get(key)

                      if isinstance(value, list):
                          return value

              return []

          function_rows = payload_rows(
              functions_list_path,
              (
                  "functions",
                  "data",
                  "items",
              ),
          )

          remote_function_names = sorted(set(
              str(
                  item.get("slug")
                  or item.get("name")
                  or item.get("function_name")
                  or ""
              ).strip()
              for item in function_rows
              if isinstance(item, dict)
              and str(
                  item.get("slug")
                  or item.get("name")
                  or item.get("function_name")
                  or ""
              ).strip()
          ))

          secret_rows = payload_rows(
              secrets_list_path,
              (
                  "secrets",
                  "data",
                  "items",
              ),
          )

          remote_secret_names = sorted(set(
              str(
                  item.get("name")
                  or item.get("key")
                  or item.get("secret_name")
                  or ""
              ).strip()
              for item in secret_rows
              if isinstance(item, dict)
              and re.fullmatch(
                  r"[A-Z][A-Z0-9_]+",
                  str(
                      item.get("name")
                      or item.get("key")
                      or item.get("secret_name")
                      or ""
                  ).strip(),
              )
          ))

          remote_market_secret_names = sorted(
              name
              for name in remote_secret_names
              if re.search(
                  r"BANXICO|UDI|MARKET|"
                  r"EXCHANGE|RATE|SIE",
                  name,
                  re.I,
              )
          )

          download_results = []

          if download_results_path.is_file():
              for line in download_results_path.read_text(
                  encoding="utf-8",
                  errors="replace",
              ).splitlines():
                  parts = line.split("\t")

                  if len(parts) >= 3:
                      download_results.append({
                          "slug": parts[0],
                          "status": parts[1],
                          "exitCode": parts[2],
                      })

          remote_function_names = sorted(set(
              remote_function_names
              + [
                  path.name
                  for path in function_dirs
              ]
          ))

          source_suffixes = {
              ".ts", ".tsx", ".js", ".mjs",
              ".cjs", ".json", ".toml",
          }

          functions = []

          for directory in function_dirs:
              files = [
                  path
                  for path in directory.rglob("*")
                  if path.is_file()
                  and path.suffix.lower()
                  in source_suffixes
              ]

              chunks = []

              for file in files:
                  try:
                      chunks.append(
                          file.read_text(
                              encoding="utf-8",
                              errors="replace",
                          )
                      )
                  except OSError:
                      pass

              combined = "\n".join(chunks)

              env_names = sorted(set(
                  re.findall(
                      r"(?:Deno\.env\.get|"
                      r"process\.env)"
                      r"\s*(?:\(|\[|\.)?"
                      r"\s*[`\"']?"
                      r"([A-Z][A-Z0-9_]{2,})",
                      combined,
                      re.I,
                  )
              ))

              matched_market_names = sorted(set(
                  name
                  for name in remote_market_secret_names
                  if re.search(
                      rf"\b{re.escape(name)}\b",
                      combined,
                      re.I,
                  )
              ))

              generic_market_env = sorted(set(
                  name
                  for name in env_names
                  if re.search(
                      r"BANXICO|UDI|MARKET|"
                      r"EXCHANGE|RATE",
                      name,
                      re.I,
                  )
              ))

              signals = sorted(set(
                  match.group(0)
                  for match in re.finditer(
                      r"BANXICO_SIE_API|"
                      r"BANXICO|UDI_MXN|"
                      r"USD_MXN_FIX|SF43718|"
                      r"exchange.?rate|market.?data",
                      combined,
                      re.I,
                  )
              ))

              score = 0
              score += len(
                  matched_market_names
              ) * 1000
              score += len(
                  generic_market_env
              ) * 500

              if re.search(
                  r"BANXICO_SIE_API",
                  combined,
                  re.I,
              ):
                  score += 1000

              if re.search(
                  r"UDI_MXN",
                  combined,
                  re.I,
              ):
                  score += 900

              if re.search(
                  r"BANXICO|SF43718",
                  combined,
                  re.I,
              ):
                  score += 700

              functions.append({
                  "slug": directory.name,
                  "sourceFileCount": len(files),
                  "envNames": env_names,
                  "matchedMarketSecretNames":
                      matched_market_names,
                  "genericMarketEnvNames":
                      generic_market_env,
                  "signals": signals,
                  "score": score,
              })

          functions.sort(
              key=lambda item: (
                  item["score"],
                  bool(
                      item[
                          "matchedMarketSecretNames"
                      ]
                  ),
                  bool(item["signals"]),
              ),
              reverse=True,
          )

          probe_order = [
              item["slug"]
              for item in functions
          ]

          probe_order.extend(
              name
              for name in remote_function_names
              if name not in probe_order
          )

          probes = []
          selected_pass = None

          for slug in probe_order[:30]:
              url = (
                  f"https://{project_ref}"
                  f".supabase.co/functions/v1/"
                  f"{slug}"
              )

              headers = {
                  "Accept": "application/json",
                  "User-Agent":
                      "ForgeOS-Remote-Audit/1.0",
              }

              auth_mode = "NO_AUTH"

              if public_key:
                  headers["apikey"] = public_key
                  headers["Authorization"] = (
                      f"Bearer {public_key}"
                  )
                  auth_mode = (
                      "PUBLIC_CLIENT_CONFIG"
                  )

              request = Request(
                  url,
                  headers=headers,
                  method="GET",
              )

              try:
                  with urlopen(
                      request,
                      timeout=15,
                  ) as response:
                      status = response.status
                      text = response.read(
                          2_000_000
                      ).decode(
                          "utf-8",
                          errors="replace",
                      )

              except HTTPError as error:
                  status = error.code
                  text = error.read(
                      1_000_000
                  ).decode(
                      "utf-8",
                      errors="replace",
                  )

              except (
                  URLError,
                  TimeoutError,
                  ValueError,
              ) as error:
                  probes.append({
                      "slug": slug,
                      "authMode": auth_mode,
                      "httpStatus": None,
                      "pass": False,
                      "source": None,
                      "date": None,
                      "reason": str(error)[:180],
                  })
                  continue

              try:
                  payload = json.loads(text)
              except json.JSONDecodeError:
                  payload = None

              rates = None

              if isinstance(payload, dict):
                  rates = (
                      payload.get("rates")
                      or (
                          payload.get("data", {})
                          if isinstance(
                              payload.get("data"),
                              dict,
                          )
                          else {}
                      ).get("rates")
                      or payload
                  )

              udi = (
                  rates.get("UDI_MXN")
                  if isinstance(rates, dict)
                  else None
              )

              valid = False
              source = None
              source_date = None

              if isinstance(udi, dict):
                  try:
                      value = float(
                          udi.get("value")
                      )
                  except (
                      TypeError,
                      ValueError,
                  ):
                      value = 0

                  source = udi.get("source")
                  source_date = (
                      udi.get("date")
                      or udi.get("sourceDate")
                  )

                  valid = (
                      200 <= status < 300
                      and value > 0
                      and source
                      == "BANXICO_SIE_API"
                  )

              error_text = ""

              if isinstance(payload, dict):
                  error_text = str(
                      payload.get("error")
                      or payload.get("message")
                      or ""
                  )
              else:
                  error_text = text[:180]

              probe = {
                  "slug": slug,
                  "authMode": auth_mode,
                  "httpStatus": status,
                  "pass": valid,
                  "source": source,
                  "date": source_date,
                  "reason": (
                      "PASS"
                      if valid
                      else (
                          error_text
                          or f"HTTP_{status}"
                      )
                      .replace("\n", " ")
                      .replace("\r", " ")
                      [:180]
                  ),
              }

              probes.append(probe)

              if valid:
                  selected_pass = probe
                  break

          market_secret_present = bool(
              remote_market_secret_names
          )

          output = {
              "status": "PASS",
              "projectRef": project_ref,
              "remoteFunctionNames":
                  remote_function_names,
              "remoteSecretNames":
                  remote_secret_names,
              "remoteMarketSecretNames":
                  remote_market_secret_names,
              "expectedMarketSecretNames":
                  expected_market_names,
              "marketSecretPresentRemote":
                  market_secret_present,
              "downloadResults":
                  download_results,
              "downloadedFunctions":
                  functions,
              "candidateFunctions": [
                  item
                  for item in functions
                  if (
                      item["score"] > 0
                      or item[
                          "matchedMarketSecretNames"
                      ]
                      or item["signals"]
                  )
              ],
              "probes": probes,
              "selectedPass":
                  selected_pass,
              "security": {
                  "secretValuesWritten": False,
                  "publicClientValueWritten":
                      False,
              },
          }

          output_path.write_text(
              json.dumps(
                  output,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY_AUDIT

      - name: Upload sanitized audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-supabase-runtime-audit-r6
          path: audit/audit.json
          if-no-files-found: error
          retention-days: 1
