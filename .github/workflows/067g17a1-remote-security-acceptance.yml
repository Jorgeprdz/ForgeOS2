name: 067G17A1 Remote Security Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-advisor-rls:
    if: github.actor == 'Jorgeprdz'
    environment: 067g17a1-remote-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      ADVISOR_A_EMAIL: ${{ secrets.ADVISOR_A_EMAIL }}
      ADVISOR_A_PASSWORD: ${{ secrets.ADVISOR_A_PASSWORD }}
      ADVISOR_B_EMAIL: ${{ secrets.ADVISOR_B_EMAIL }}
      ADVISOR_B_PASSWORD: ${{ secrets.ADVISOR_B_PASSWORD }}
      FORGE_067G17A1_REMOTE_RLS_AUTHORIZED: YES
      FORGE_067G17A1_REMOTE_WRITE_CONFIRMATION: YES
      FORGE_067G17A1_REMOTE_EVIDENCE: artifacts/067g17a1-remote/ledger.jsonl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run protected two-advisor RLS acceptance
        run: node scripts/forge-067g17a1-remote-two-advisor-rls.mjs
      - name: Upload redacted acceptance ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 067g17a1-remote-security-ledger
          path: artifacts/067g17a1-remote/ledger.jsonl
          if-no-files-found: error
