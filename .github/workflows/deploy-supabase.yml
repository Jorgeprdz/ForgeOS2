name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

jobs:
  deploy-semantic-extract:
    runs-on: ubuntu-latest

    env:
      SUPABASE_PROJECT_REF: rmlxigxysujsuwzgoimv

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Print deployed source version
        run: |
          echo "Commit:"
          git rev-parse HEAD
          echo "Function source version:"
          grep -n "FUNCTION_VERSION\|MODEL_VERSION" supabase/functions/semantic-extract/index.ts
          echo "Function directory:"
          find supabase/functions/semantic-extract -maxdepth 2 -type f -print

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase CLI version
        run: supabase --version

      - name: Deploy semantic-extract
        run: |
          supabase functions deploy semantic-extract \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test semantic-extract
        run: |
          sleep 5

          curl --max-time 30 -s -L -X POST \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/semantic-extract" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"note":"Pidió 6 cotizaciones para el martes"}' \
            | tee response.json

          echo
          echo "Smoke response:"
          cat response.json

          grep -q "semantic-extract-v0.6" response.json
          grep -q "advisor" response.json
