name: 067G17A1 Predeployment Security Gate

on:
  push:
    branches:
      - verify/067g17a1-predeployment

permissions:
  contents: read

jobs:
  predeployment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APPROVED_SUPABASE_PROJECT_REF: rmlxigxysujsuwzgoimv
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run local security gates
        run: sh tools/forge-067g17a1-local-runner.sh
      - name: Verify production schema preconditions read-only
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';

          const ref = process.env.APPROVED_SUPABASE_PROJECT_REF;
          assert.equal(new URL(process.env.SUPABASE_URL).hostname, `${ref}.supabase.co`, 'PROJECT_REF_MISMATCH');
          assert.ok(process.env.SUPABASE_ACCESS_TOKEN, 'SUPABASE_ACCESS_TOKEN_MISSING');
          const query = `
            select
              (select count(*)::int from public.prospects where advisor_id is null) as unowned_prospects,
              pg_catalog.to_regclass('public.opportunities') is not null as opportunities_exists,
              pg_catalog.to_regclass('public.prospect_contact_methods') is not null as contact_methods_exists,
              pg_catalog.to_regclass('public.prospect_provenance') is not null as provenance_exists,
              pg_catalog.to_regclass('public.opportunity_status_history') is not null as history_exists
          `;
          const response = await fetch(`https://api.supabase.com/v1/projects/${ref}/database/query/read-only`, {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ query })
          });
          assert.equal(response.ok, true, `READ_ONLY_PREFLIGHT_HTTP_${response.status}`);
          const body = await response.json();
          assert.ok(!body.error, 'READ_ONLY_PREFLIGHT_QUERY_ERROR');
          const row = Array.isArray(body.result) ? body.result[0] : body[0];
          assert.ok(row, 'READ_ONLY_PREFLIGHT_EMPTY_RESULT');
          assert.equal(Number(row.unowned_prospects), 0, 'UNOWNED_PROSPECTS_BLOCK_MIGRATION');
          assert.equal(row.opportunities_exists, false, 'OPPORTUNITIES_ALREADY_EXISTS');
          assert.equal(row.contact_methods_exists, false, 'CONTACT_METHODS_ALREADY_EXISTS');
          assert.equal(row.provenance_exists, false, 'PROVENANCE_ALREADY_EXISTS');
          assert.equal(row.history_exists, false, 'STATUS_HISTORY_ALREADY_EXISTS');
          console.log('067G17A1 PRODUCTION SCHEMA PREFLIGHT: PASS');
          NODE
